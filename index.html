<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--ARTIFACT-KEEP-START-->
<title>July 13–15, 2026 Agenda · PHDc NCKU</title>
<style>
  :root{
    --green:#489340; --green-d:#356e2f; --green-l:#eaf4e8;
    --ink:#222; --muted:#6b7280; --line:#e6e6e6; --bg:#f6f7f5; --card:#fff; --chip:#f1f3f0;
    --warn:#fff6e0; --warn-b:#e6b800; --flag:#eaf4e8;
    --font: Calibri, "Segoe UI", "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --green-d:#7cc470; --ink:#e8eae6; --muted:#9aa39a; --line:#343a2e; --bg:#14160f;
           --card:#1e211a; --chip:#262a20; --flag:#20301c; --green-l:#22301e; --warn:#2e2a16; }
  }
  :root[data-theme="dark"]{ --green-d:#7cc470; --ink:#e8eae6; --muted:#9aa39a; --line:#343a2e; --bg:#14160f;
           --card:#1e211a; --chip:#262a20; --flag:#20301c; --green-l:#22301e; --warn:#2e2a16; }
  :root[data-theme="light"]{ --green-d:#356e2f; --ink:#222; --muted:#6b7280; --line:#e6e6e6; --bg:#f6f7f5;
           --card:#fff; --chip:#f1f3f0; --flag:#eaf4e8; --green-l:#eaf4e8; --warn:#fff6e0; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;
       -webkit-text-size-adjust:100%;}
  .wrap{max-width:720px;margin:0 auto;padding:16px 14px 60px;}
  header{display:flex;align-items:center;gap:12px;padding:6px 2px 14px;}
  header img{height:52px;width:auto;}
  header .t h1{font-size:19px;margin:0;color:var(--green-d);font-weight:700;letter-spacing:.3px;}
  header .t p{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
  .picker{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;
          box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .picker label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;}
  select{width:100%;font-family:var(--font);font-size:17px;padding:12px 12px;border:1.5px solid var(--green);
         border-radius:10px;background:var(--card);color:var(--ink);appearance:none;-webkit-appearance:none;
         background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23489340' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
         background-repeat:no-repeat;background-position:right 14px center;}
  .tabs{display:flex;gap:8px;margin:0 0 14px;}
  .tabs button{flex:1;font-family:var(--font);font-size:15px;padding:11px 6px;border:1px solid var(--line);
        background:var(--card);border-radius:10px;color:var(--muted);cursor:pointer;font-weight:600;}
  .tabs button .d{display:block;font-size:11px;font-weight:500;margin-top:1px;}
  .tabs button.active{background:var(--green);color:#fff;border-color:var(--green);}
  .whoami{font-size:14px;color:var(--muted);margin:0 2px 10px;}
  .whoami b{color:var(--green-d);font-size:16px;}
  .duties{background:var(--flag);border:1px solid #cfe6c9;border-left:5px solid var(--green);
          border-radius:10px;padding:11px 13px;margin-bottom:12px;}
  .duties .h{font-size:12px;color:var(--green-d);font-weight:700;margin-bottom:4px;letter-spacing:.5px;}
  .duties .item{font-size:15px;margin-top:3px;}
  .duties .item .en{font-size:12px;color:var(--muted);}
  .banner{background:var(--warn);border:1px solid #f0dca0;border-left:5px solid var(--warn-b);
          border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13.5px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:11px;
        box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card.flag{border-left:5px solid var(--green);}
  .card .time{font-size:15px;font-weight:700;color:var(--green-d);}
  .card .badge{float:right;font-size:11.5px;font-weight:700;color:#fff;background:var(--green);
        border-radius:20px;padding:3px 10px;margin-left:8px;}
  .card .badge.plain{background:var(--line);color:var(--muted);}
  .card h3{margin:6px 0 2px;font-size:16px;font-weight:700;}
  .card .en{font-size:12.5px;color:var(--muted);margin:0 0 5px;}
  .card .meta{font-size:13px;color:#444;margin-top:5px;}
  .card .meta .k{color:var(--muted);}
  .card .maplink{color:var(--green-d);font-weight:600;text-decoration:none;white-space:nowrap;cursor:pointer;
        border:1px solid #cfe6c9;background:var(--green-l);border-radius:6px;padding:1px 7px;margin-left:6px;font-size:12px;
        display:inline-block;margin-top:3px;}
  .card .maplink.slides{color:#fff;background:var(--green);border-color:var(--green);}
  .card .note{font-size:12.5px;color:var(--muted);margin-top:6px;border-top:1px dashed var(--line);padding-top:6px;}
  .card .todo{display:inline-block;margin-top:6px;font-size:13px;color:var(--green-d);font-weight:600;}
  .free{text-align:center;color:var(--muted);padding:34px 10px;font-size:15px;}
  .free .big{font-size:34px;margin-bottom:6px;}
  .att{font-size:12.5px;color:#555;margin-top:6px;}
  .att .chip{display:inline-block;background:var(--chip);border-radius:6px;padding:2px 7px;margin:2px 3px 0 0;font-size:12px;}
  .att .chip.v{background:var(--green-l);color:var(--green-d);font-weight:600;}
  footer{text-align:center;font-size:11.5px;color:#aaa;margin-top:22px;}
  .allhint{font-size:12.5px;color:var(--muted);margin:-4px 2px 12px;}
  .gallery{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:none;
        align-items:center;justify-content:center;}
  .gallery.open{display:flex;}
  #gimg{max-width:96vw;max-height:82vh;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.6);
        touch-action:pan-y;user-select:none;}
  .gclose{position:absolute;top:10px;right:14px;font-size:30px;line-height:1;color:#fff;background:none;
        border:none;cursor:pointer;padding:6px 10px;}
  .gnav{position:absolute;top:50%;transform:translateY(-50%);font-size:38px;line-height:1;color:#fff;
        background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:6px 16px;border-radius:10px;}
  .gprev{left:8px;} .gnext{right:8px;}
  .gcount{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;
        background:rgba(0,0,0,.45);padding:4px 14px;border-radius:20px;font-variant-numeric:tabular-nums;}
  @media(max-width:600px){ .gnav{font-size:30px;padding:6px 11px;} #gimg{max-height:76vh;} }
</style>
<!--ARTIFACT-KEEP-END-->
</head>

const SLIDE_IMGS = [];
let sel = "__ALL__";
let day = "7/13";
let slideIx = 0;
function openSlides(){ slideIx=0; showSlide(); document.getElementById('gallery').classList.add('open'); document.body.style.overflow='hidden'; }
function closeSlides(){ document.getElementById('gallery').classList.remove('open'); document.body.style.overflow=''; }
function showSlide(){ document.getElementById('gimg').src=SLIDE_IMGS[slideIx];
  document.getElementById('gcount').textContent=(slideIx+1)+' / '+SLIDE_IMGS.length; }
function slideNext(d){ slideIx=(slideIx+d+SLIDE_IMGS.length)%SLIDE_IMGS.length; showSlide(); }
document.addEventListener('keydown',e=>{
  if(!document.getElementById('gallery').classList.contains('open')) return;
  if(e.key==='ArrowRight') slideNext(1);
  else if(e.key==='ArrowLeft') slideNext(-1);
  else if(e.key==='Escape') closeSlides();
});
let _tsx=0;
function gTouchStart(e){ _tsx=e.changedTouches[0].clientX; }
function gTouchEnd(e){ const dx=e.changedTouches[0].clientX-_tsx; if(Math.abs(dx)>40) slideNext(dx<0?1:-1); }

function personLabel(k){
  const p = DATA.people.find(x=>x.key===k);
  if(!p) return k;
  return p.zh + (p.en? " ("+p.en+")":"");
}
function isVisitor(k){
  const p = DATA.people.find(x=>x.key===k);
  return p && p.group.indexOf("外賓")>=0;
}

(function(){
  const s = document.getElementById('who');
  const all = document.createElement('option');
  all.value="__ALL__"; all.textContent="— 全部 / All（完整細流）—"; s.appendChild(all);
  const groups={}, order=[];
  DATA.people.forEach(p=>{ if(!groups[p.group]){groups[p.group]=[];order.push(p.group);} groups[p.group].push(p);});
  order.forEach(g=>{
    const og=document.createElement('optgroup'); og.label=g;
    groups[g].forEach(p=>{
      const o=document.createElement('option'); o.value=p.key;
      o.textContent=p.zh+(p.en?" · "+p.en:""); og.appendChild(o);
    });
    s.appendChild(og);
  });
  s.addEventListener('change',e=>{sel=e.target.value; render();});
})();

document.querySelectorAll('#tabs button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); day=b.dataset.day; render();
  });
});

function myRole(ev){ return ev.attendees.find(a=>a.p===sel); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const c=document.getElementById('content');
  c.innerHTML='';
  const dayEvents = DATA.events.filter(e=>e.day===day);

  if(sel==="__ALL__"){
    const h=document.createElement('div'); h.className='allhint';
    h.textContent='完整細流（所有人）· All events with full attendee lists';
    c.appendChild(h);
    dayEvents.forEach(ev=>c.appendChild(cardAll(ev)));
    return;
  }

  const who=document.createElement('div'); who.className='whoami';
  who.innerHTML='目前檢視 · Viewing as　<b>'+esc(personLabel(sel))+'</b>';
  c.appendChild(who);

  if(DATA.departed[sel] && DATA.departed[sel].indexOf(day)>=0){
    const b=document.createElement('div'); b.className='banner';
    b.textContent='✈ '+DATA.departed[sel];
    c.appendChild(b);
  }

  const departedNow = DATA.departed[sel] && DATA.departed[sel].indexOf(day)>=0;
  const items=dayEvents.map(ev=>{
    let role=myRole(ev);
    if(!role && ev.opt && !departedNow){ role={zh:'自由參加 Optional', note:'', flag:false, optional:true}; }
    return role? {ev,role}:null;
  }).filter(Boolean);
  const myDuties=DATA.duties.filter(d=>d.day===day && d.person===sel);
  const flagged=items.filter(x=>x.role.flag);

  if(myDuties.length || flagged.length){
    const d=document.createElement('div'); d.className='duties';
    let inner='<div class="h">⚑ 你的重點任務 · YOUR KEY DUTY</div>';
    myDuties.forEach(x=>{ inner+='<div class="item">'+esc(x.zh)+'<div class="en">'+esc(x.en)+'</div></div>'; });
    flagged.forEach(x=>{
      inner+='<div class="item">'+x.ev.start+'　'+esc(x.ev.zh)+' — '+esc(x.role.zh)+
             (x.role.note?'（'+esc(x.role.note)+'）':'')+'</div>';
    });
    d.innerHTML=inner; c.appendChild(d);
  }

  if(!items.length){
    const f=document.createElement('div'); f.className='free';
    f.innerHTML='<div class="big">☕</div>這一天沒有安排的行程<br><span style="font-size:13px">Free time — no scheduled item</span>';
    c.appendChild(f);
    return;
  }

  if(day==="7/13" && sel==="ED"){
    const b=document.createElement('div'); b.className='banner';
    b.innerHTML='⚠ 16:00 有兩場同時進行：<b>敬堯口試</b>（口委）與 <b>Wallis 演講</b>。請確認你要去的場次。';
    c.appendChild(b);
  }

  items.forEach(x=>c.appendChild(cardMine(x.ev,x.role)));
}

function cardMine(ev,role){
  const hl=role.flag||role.hi;
  const d=document.createElement('div'); d.className='card'+(hl?' flag':'');
  const badge=hl?'badge':'badge plain';
  d.innerHTML=
    '<span class="'+badge+'">'+esc(role.zh)+'</span>'+
    '<div class="time">'+ev.start+' – '+ev.end+'</div>'+
    '<h3>'+(role.flag?'⚑ ':'')+esc(ev.zh)+'</h3>'+
    '<div class="en">'+esc(ev.en)+'</div>'+
    '<div class="meta"><span class="k">地點 Venue：</span>'+esc(ev.room)+(ev.roomEn?' '+esc(ev.roomEn):'')+
      (ev.map?' <a class="maplink" href="'+esc(ev.map)+'" target="_blank" rel="noopener">📍 地圖 Map</a>':'')+
      (ev.slides?' <a class="maplink slides" href="javascript:void(0)" onclick="openSlides();return false;">📎 投影片 Slides</a>':'')+'</div>'+
    (role.note?'<div class="todo">→ '+esc(role.note)+'</div>':'')+
    (ev.note?'<div class="note">'+esc(ev.note)+'</div>':'');
  return d;
}

  d.innerHTML=
    '<div class="time">'+ev.start+' – '+ev.end+'</div>'+
    '<h3>'+esc(ev.zh)+'</h3>'+

      (ev.map?' <a class="maplink" href="'+esc(ev.map)+'" target="_blank" rel="noopener">📍 地圖 Map</a>':'')+
      (ev.slides?' <a class="maplink slides" href="javascript:void(0)" onclick="openSlides();return false;">📎 投影片 Slides</a>':'')+'</div>'+
    (ev.note?'<div class="note">'+esc(ev.note)+'</div>':'')+
    '<div class="att">'+chips+'</div>';
  return d;
}

render();
</script>
